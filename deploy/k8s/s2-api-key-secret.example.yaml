# Example: wire S2_API_KEY on the engine pod for R1b warm ingest.
# See li-research-ingest#6 — replace placeholder before apply.
#
#   kubectl apply -f deploy/k8s/s2-api-key-secret.example.yaml -n li-swarm
#   kubectl rollout restart deployment/li-research-ingest -n li-swarm
#
# Scripts auto-probe /run/secrets/s2-api-key (S2_API_KEY_FILE) when S2_API_KEY is unset.

apiVersion: v1
kind: Secret
metadata:
  name: li-research-s2-api-key
  namespace: li-swarm
  labels:
    app: li-research-ingest
    li-langverse.io/component: warm-index
type: Opaque
stringData:
  s2-api-key: "REPLACE_WITH_SEMANTIC_SCHOLAR_DATASETS_API_KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: li-research-ingest
  namespace: li-swarm
  labels:
    app: li-research-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: li-research-ingest
  template:
    metadata:
      labels:
        app: li-research-ingest
    spec:
      containers:
        - name: ingest
          image: ghcr.io/li-langverse/li-research-ingest:latest
          env:
            - name: WARM_INDEX_PATH
              value: /warm-index
            - name: S2_API_KEY_FILE
              value: /run/secrets/s2-api-key
          volumeMounts:
            - name: warm-index
              mountPath: /warm-index
            - name: s2-api-key
              mountPath: /run/secrets/s2-api-key
              subPath: s2-api-key
              readOnly: true
          command:
            - bash
            - -lc
            - ./scripts/unblock-r1b.sh --wait-for-key 3600
      volumes:
        - name: warm-index
          hostPath:
            path: /srv/homelab/intenso-research/li-research/warm-index
            type: DirectoryOrCreate
        - name: s2-api-key
          secret:
            secretName: li-research-s2-api-key
            items:
              - key: s2-api-key
                path: s2-api-key
