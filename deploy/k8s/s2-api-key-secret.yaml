# Semantic Scholar Datasets API key for R1b warm ingest (≥1 GiB staging/s2 gate).
# Replace the placeholder, then apply (see deploy/k8s/README.md).
#
#   kubectl apply -f deploy/k8s/s2-api-key-secret.yaml -n li-swarm
#   kubectl apply -f deploy/k8s/li-research-ingest-s2-patch.yaml -n li-swarm
#   kubectl rollout restart deployment/li-research-ingest -n li-swarm

apiVersion: v1
kind: Secret
metadata:
  name: li-research-s2-api-key
  namespace: li-swarm
  labels:
    app: li-research-ingest
    li-langverse.io/component: warm-index
type: Opaque
stringData:
  s2-api-key: "REPLACE_WITH_SEMANTIC_SCHOLAR_DATASETS_API_KEY"
