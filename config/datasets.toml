# Warm-index dataset paths — mounted on engine pod at /warm-index
# Host: /srv/homelab/nvme/li-research/warm-index (engine NVMe)

[warm_index]
root = "/warm-index"
staging = "/warm-index/staging"
bootstrap_marker = "/warm-index/staging/.ingest-bootstrap-ok"

[s2]
api_base = "https://api.semanticscholar.org/datasets/v1"
release = "latest"
# Set S2_API_KEY in the environment (Vault later). Required for full corpus downloads.

[s2.paths]
abstracts = "/warm-index/staging/s2/abstracts"
papers = "/warm-index/staging/s2/papers"
citations = "/warm-index/staging/s2/citations"

[arxiv]
oai_endpoint = "http://export.arxiv.org/oai2"
metadata_prefix = "arXiv"
# scope: "full" = entire arXiv OAI repository; "sets" = listed setSpecs only
scope = "full"
sets = ["cs:cs:AI", "cs:cs:LG", "cs:cs:CL", "stat:stat:ML"]
output = "/warm-index/staging/arxiv"
full_output = "/warm-index/staging/arxiv/full/pages"
# arXiv policy: at most one OAI request every 3 seconds
request_interval_sec = 3

[openalex]
api_base = "https://api.openalex.org"
# Computer Science field (public REST, mailto polite pool)
works_filter = "topics.field.id:17"
per_page = 200
output = "/warm-index/staging/openalex"
request_interval_sec = 1

[lidb]
schema_migration = "006_research.sql"
loader_stub = "/warm-index/staging/lidb-load"
